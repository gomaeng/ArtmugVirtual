<!DOCTYPE html>

<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>gomaeng_2</title>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    background:#ffffff;
    color:#555;
    font-family:sans-serif;
}

.container{
    width:100%;
    max-width:1080px;
    margin:auto;
    padding:20px;
}

.section{
    margin-top:80px;
}

.title{
    font-size:28px;
    font-weight:bold;
    color:#fcbccb;
    margin-bottom:20px;
}

.profile{
    text-align:center;
    padding-top:40px;
}

.profile img{
    width:160px;
    height:160px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid #fcbccb;
}

.profile h1{
    margin-top:20px;
    font-size:36px;
}

.profile p{
    color:#888;
    margin-top:8px;
}

.work img{
    width:100%;
    display:block;
    border-radius:12px;
    margin-bottom:20px;
}

.process-box,
.notice-box,
.form-box{
    background:#fff7f9;
    border:1px solid #fcbccb;
    border-radius:15px;
    padding:25px;
    line-height:2;
}

.artist-grid{
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:25px;
}

.artist-card{
    background:#fff;
}

.artist-card img.work{
    width:100%;
    aspect-ratio:16/9;
    object-fit:cover;
    border-radius:12px;
}

.artist-info{
    display:flex;
    align-items:center;
    gap:10px;
    margin-top:10px;
}

.artist-info img{
    width:40px;
    height:40px;
    border-radius:50%;
    object-fit:cover;
}

.artist-name{
    text-decoration:none;
    font-weight:bold;
}

@media (max-width:700px){

.artist-grid{
    grid-template-columns:1fr;
}

.profile img{
    width:120px;
    height:120px;
}

.profile h1{
    font-size:28px;
}

}

</style>

</head>

<body>

<div class="container">
